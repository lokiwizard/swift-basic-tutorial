<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
  <defs>
    <style>
      .title { font: bold 20px sans-serif; }
      .label { font: 14px sans-serif; }
      .small { font: 12px sans-serif; }
      .box { fill: #e3f2fd; stroke: #1976d2; stroke-width: 2; }
      .diamond { fill: #fff3e0; stroke: #f57c00; stroke-width: 2; }
      .round { fill: #c8e6c9; stroke: #388e3c; stroke-width: 2; rx: 10; }
    </style>
  </defs>

  <!-- 标题 -->
  <text x="450" y="30" text-anchor="middle" class="title">Swift 控制流</text>

  <!-- if-else 流程 -->
  <text x="150" y="70" text-anchor="middle" class="label">if-else 条件语句</text>

  <rect x="50" y="80" width="120" height="40" class="round"/>
  <text x="110" y="105" text-anchor="middle" class="label">开始</text>

  <polygon points="110,130 170,165 110,200 50,165" class="diamond"/>
  <text x="110" y="170" text-anchor="middle" class="small">条件?</text>

  <rect x="200" y="140" width="120" height="40" class="box"/>
  <text x="260" y="165" text-anchor="middle" class="label">执行代码块A</text>

  <rect x="0" y="210" width="120" height="40" class="box"/>
  <text x="60" y="235" text-anchor="middle" class="label">执行代码块B</text>

  <line x1="110" y1="200" x2="110" y2="250" stroke="#666"/>
  <line x1="170" y1="165" x2="200" y2="165" stroke="#666"/>
  <text x="185" y="155" class="small">true</text>
  <text x="125" y="205" class="small">false</text>

  <!-- switch 流程 -->
  <text x="550" y="70" text-anchor="middle" class="label">switch 模式匹配</text>

  <rect x="450" y="80" width="120" height="40" class="round"/>
  <text x="510" y="105" text-anchor="middle" class="label">开始</text>

  <rect x="450" y="130" width="200" height="40" class="diamond"/>
  <text x="550" y="155" text-anchor="middle" class="label">switch 值</text>

  <rect x="400" y="200" width="100" height="40" class="box"/>
  <text x="450" y="225" text-anchor="middle" class="label">case 1</text>

  <rect x="520" y="200" width="100" height="40" class="box"/>
  <text x="570" y="225" text-anchor="middle" class="label">case 2</text>

  <rect x="640" y="200" width="100" height="40" class="box"/>
  <text x="690" y="225" text-anchor="middle" class="label">default</text>

  <!-- 循环流程 -->
  <text x="150" y="320" text-anchor="middle" class="label">for-in 循环</text>

  <rect x="50" y="340" width="120" height="40" class="round"/>
  <text x="110" y="365" text-anchor="middle" class="label">开始</text>

  <polygon points="110,390 170,425 110,460 50,425" class="diamond"/>
  <text x="110" y="430" text-anchor="middle" class="small">还有元素?</text>

  <rect x="200" y="400" width="120" height="40" class="box"/>
  <text x="260" y="425" text-anchor="middle" class="label">执行循环体</text>

  <line x1="230" y1="400" x2="170" y2="425" stroke="#666"/>
  <text x="190" y="395" class="small">true</text>

  <rect x="50" y="480" width="120" height="40" class="round"/>
  <text x="110" y="505" text-anchor="middle" class="label">结束</text>

  <line x1="110" y1="460" x2="110" y2="480" stroke="#666"/>
  <text x="125" y="470" class="small">false</text>

  <!-- while 循环 -->
  <text x="550" y="320" text-anchor="middle" class="label">while 循环</text>

  <rect x="450" y="340" width="120" height="40" class="round"/>
  <text x="510" y="365" text-anchor="middle" class="label">开始</text>

  <polygon points="510,390 570,425 510,460 450,425" class="diamond"/>
  <text x="510" y="430" text-anchor="middle" class="small">条件?</text>

  <rect x="600" y="400" width="120" height="40" class="box"/>
  <text x="660" y="425" text-anchor="middle" class="label">执行循环体</text>

  <line x1="660" y1="400" x2="570" y2="425" stroke="#666"/>
  <text x="610" y="395" class="small">true</text>

  <rect x="450" y="480" width="120" height="40" class="round"/>
  <text x="510" y="505" text-anchor="middle" class="label">结束</text>

  <line x1="510" y1="460" x2="510" y2="480" stroke="#666"/>
  <text x="525" y="470" class="small">false</text>
</svg>
